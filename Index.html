<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Immo Ain 2026 - Interactive</title>
    <!-- Scripts pour faire tourner React dans le navigateur sans compilation -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Icônes SVG intégrées (Lucide-like)
        const IconTrending = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"></polyline><polyline points="16 7 22 7 22 13"></polyline></svg>;
        const IconApt = () => <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="4" y="2" width="16" height="20" rx="2" ry="2"></rect><line x1="9" y1="22" x2="9" y2="2"></line><line x1="15" y1="22" x2="15" y2="2"></line><line x1="4" y1="6" x2="20" y2="6"></line><line x1="4" y1="10" x2="20" y2="10"></line><line x1="4" y1="14" x2="20" y2="14"></line><line x1="4" y1="18" x2="20" y2="18"></line></svg>;
        const IconHome = () => <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>;
        const IconTree = () => <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 19V5"></path><path d="m9 9 3-3 3 3"></path><path d="m9 15 3-3 3 3"></path><path d="M18 22H6"></path></svg>;

        const App = () => {
            const [selectedZone, setSelectedZone] = useState('all');
            const [selectedCity, setSelectedCity] = useState(null);
            const [isModalOpen, setIsModalOpen] = useState(false);

            const data = [
                { name: "Divonne-les-Bains", zone: "Frontier", avg: 5790, details: { apt: 6200, house: 5400, land: 950 } },
                { name: "Prévessin-Moëns", zone: "Frontier", avg: 4870, details: { apt: 5100, house: 4600, land: 880 } },
                { name: "Thoiry", zone: "Frontier", avg: 4840, details: { apt: 4950, house: 4700, land: 820 } },
                { name: "St-Genis-Pouilly", zone: "Frontier", avg: 4580, details: { apt: 4750, house: 4100, land: 750 } },
                { name: "Beynost", zone: "Lyon", avg: 3200, details: { apt: 3450, house: 2950, land: 420 } },
                { name: "Miribel", zone: "Lyon", avg: 3150, details: { apt: 3100, house: 3200, land: 380 } },
                { name: "Meximieux", zone: "Lyon", avg: 2850, details: { apt: 2700, house: 2950, land: 290 } },
                { name: "Ambérieu-en-Bugey", zone: "Central", avg: 2200, details: { apt: 2100, house: 2300, land: 180 } },
                { name: "Bourg-en-Bresse", zone: "Central", avg: 1860, details: { apt: 1750, house: 2150, land: 140 } },
                { name: "Oyonnax", zone: "Central", avg: 1640, details: { apt: 1450, house: 1850, land: 110 } },
                { name: "Nantua", zone: "Central", avg: 1320, details: { apt: 1200, house: 1450, land: 90 } }
            ];

            const filteredData = selectedZone === 'all' ? data : data.filter(d => d.zone === selectedZone);

            const zones = [
                { id: 'all', label: 'Toutes', color: 'bg-slate-900 text-white' },
                { id: 'Frontier', label: 'Gex', color: 'bg-rose-500 text-white' },
                { id: 'Lyon', label: 'Lyon', color: 'bg-blue-500 text-white' },
                { id: 'Central', label: 'Bresse', color: 'bg-emerald-500 text-white' }
            ];

            const handleSelect = (city) => {
                setSelectedCity(city);
                setIsModalOpen(true);
            };

            return (
                <div className="min-h-screen flex flex-col">
                    {/* Header */}
                    <header className="bg-slate-900 p-6 text-white shrink-0">
                        <div className="flex items-center gap-3">
                            <span className="text-blue-500"><IconTrending /></span>
                            <h1 className="text-xl font-black uppercase tracking-tight">Immo Ain 2026</h1>
                        </div>
                    </header>

                    {/* Filtres */}
                    <div className="p-4 border-b border-slate-100 flex gap-2 overflow-x-auto no-scrollbar bg-white sticky top-0 z-10">
                        {zones.map(z => (
                            <button 
                                key={z.id}
                                onClick={() => setSelectedZone(z.id)}
                                className={`px-5 py-2 rounded-full text-xs font-bold transition-all shadow-sm shrink-0 ${selectedZone === z.id ? z.color : 'bg-slate-50 text-slate-500 border border-slate-200'}`}
                            >
                                {z.label}
                            </button>
                        ))}
                    </div>

                    {/* Liste */}
                    <div className="flex-grow p-4 md:p-8 max-w-2xl mx-auto w-full">
                        <div className="space-y-3">
                            {filteredData.map((item, idx) => (
                                <div 
                                    key={idx}
                                    onClick={() => handleSelect(item)}
                                    className={`p-5 rounded-2xl border transition-all cursor-pointer bg-white active:scale-95 ${selectedCity?.name === item.name ? 'border-blue-400 shadow-lg ring-2 ring-blue-50' : 'border-slate-100 shadow-sm'}`}
                                >
                                    <div className="flex justify-between items-center">
                                        <div>
                                            <h4 className="font-bold text-slate-900">{item.name}</h4>
                                            <span className={`text-[9px] font-bold px-2 py-0.5 rounded uppercase text-white ${item.zone === 'Frontier' ? 'bg-rose-500' : item.zone === 'Lyon' ? 'bg-blue-500' : 'bg-emerald-500'}`}>
                                                {item.zone}
                                            </span>
                                        </div>
                                        <div className="text-right">
                                            <p className="text-xl font-black text-slate-900">{item.avg.toLocaleString()} €</p>
                                            <p className="text-[9px] text-slate-400 uppercase font-bold tracking-tighter">m² moyen</p>
                                        </div>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>

                    {/* Modal Mobile */}
                    {isModalOpen && selectedCity && (
                        <div className="fixed inset-0 z-50 flex flex-col bg-slate-900/40 backdrop-blur-md transition-all">
                            <div className="mt-auto bg-white rounded-t-[40px] p-8 shadow-2xl animate-bounce-in">
                                <div className="flex justify-between items-center mb-8">
                                    <h2 className="text-2xl font-black uppercase text-slate-900">{selectedCity.name}</h2>
                                    <button onClick={() => setIsModalOpen(false)} className="p-2 bg-slate-100 rounded-full text-slate-400">
                                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                                    </button>
                                </div>
                                
                                <div className="space-y-4">
                                    <div className="bg-indigo-50 p-5 rounded-3xl border border-indigo-100 flex items-center gap-5">
                                        <div className="p-3 bg-white text-indigo-600 rounded-2xl shadow-sm"><IconApt /></div>
                                        <div>
                                            <p className="text-xs font-bold text-indigo-400 uppercase">Appartements</p>
                                            <p className="text-2xl font-black text-slate-900">{selectedCity.details.apt.toLocaleString()} €<span className="text-sm font-normal opacity-40 italic">/m²</span></p>
                                        </div>
                                    </div>
                                    <div className="bg-orange-50 p-5 rounded-3xl border border-orange-100 flex items-center gap-5">
                                        <div className="p-3 bg-white text-orange-600 rounded-2xl shadow-sm"><IconHome /></div>
                                        <div>
                                            <p className="text-xs font-bold text-orange-400 uppercase">Maisons</p>
                                            <p className="text-2xl font-black text-slate-900">{selectedCity.details.house.toLocaleString()} €<span className="text-sm font-normal opacity-40 italic">/m²</span></p>
                                        </div>
                                    </div>
                                    <div className="bg-emerald-50 p-5 rounded-3xl border border-emerald-100 flex items-center gap-5">
                                        <div className="p-3 bg-white text-emerald-600 rounded-2xl shadow-sm"><IconTree /></div>
                                        <div>
                                            <p className="text-xs font-bold text-emerald-400 uppercase">Terrains</p>
                                            <p className="text-2xl font-black text-slate-900">{selectedCity.details.land.toLocaleString()} €<span className="text-sm font-normal opacity-40 italic">/m²</span></p>
                                        </div>
                                    </div>
                                </div>

                                <button onClick={() => setIsModalOpen(false)} className="w-full mt-8 py-5 bg-slate-900 text-white font-black rounded-2xl tracking-widest uppercase text-xs shadow-xl active:scale-95 transition-all">
                                    Fermer
                                </button>
                            </div>
                        </div>
                    )}

                    <footer className="p-6 bg-white border-t border-slate-100 text-center">
                        <p className="text-[10px] text-slate-400 uppercase font-bold tracking-[0.2em]">Données 2026 • © Immo Ain</p>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
    <style>
        @keyframes bounce-in {
            0% { transform: translateY(100%); }
            100% { transform: translateY(0); }
        }
        .animate-bounce-in { animation: bounce-in 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
    </style>
</body>
</html>
